name: Hive Fix
run-name: "Fix: ${{ github.event.inputs.error_summary || 'bug fix' }}"

on:
  workflow_dispatch:
    inputs:
      error_summary:
        description: 'Brief error description'
        required: true
      company_slug:
        description: 'Company slug'
        required: true
      source:
        description: 'Source agent (healer, ops, sentinel)'
        required: false
        default: 'healer'
      payload:
        description: 'JSON payload with error details'
        required: false
        default: '{}'

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure git
        run: |
          git config user.name "Hive Healer"
          git config user.email "noreply@github.com"

      - name: Get tokens via OIDC
        id: auth
        run: |
          OIDC_TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://hive-phi.vercel.app" \
            | jq -r '.value')

          RESPONSE=$(curl -s -X POST "https://hive-phi.vercel.app/api/agents/token" \
            -H "Authorization: Bearer $OIDC_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"token_type":"claude"}')

          CLAUDE_TOKEN=$(echo "$RESPONSE" | jq -r '.data.token // empty')
          if [ -z "$CLAUDE_TOKEN" ]; then
            echo "Failed to get Claude token: $(echo "$RESPONSE" | jq -r '.error // "unknown"')"
            exit 1
          fi
          echo "::add-mask::$CLAUDE_TOKEN"
          echo "claude_token=$CLAUDE_TOKEN" >> $GITHUB_OUTPUT

          RESPONSE2=$(curl -s -X POST "https://hive-phi.vercel.app/api/agents/token" \
            -H "Authorization: Bearer $OIDC_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"token_type":"github_pat"}')
          GH_PAT_TOKEN=$(echo "$RESPONSE2" | jq -r '.data.token // empty')
          if [ -n "$GH_PAT_TOKEN" ]; then
            echo "::add-mask::$GH_PAT_TOKEN"
            echo "gh_pat=$GH_PAT_TOKEN" >> $GITHUB_OUTPUT
          fi

      - name: Load error context from Hive API
        id: context
        run: |
          SLUG="${{ github.event.inputs.company_slug }}"
          OIDC_TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://hive-phi.vercel.app" \
            | jq -r '.value')

          CTX=$(curl -s "https://hive-phi.vercel.app/api/agents/context?agent=fix&company_slug=$SLUG" \
            -H "Authorization: Bearer $OIDC_TOKEN" \
            | jq -r '.data // {}' | head -c 8000)

          echo "error_ctx<<CTXEOF" >> $GITHUB_OUTPUT
          echo "$CTX" >> $GITHUB_OUTPUT
          echo "CTXEOF" >> $GITHUB_OUTPUT

      - name: Run fix agent
        id: agent
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ steps.auth.outputs.claude_token }}
          claude_args: "--model claude-sonnet-4-20250514 --max-turns 20 --allowedTools Bash,Read,Write,Edit"
          prompt: |
            You are the Healer agent of Hive, fixing a bug in this company's codebase.

            ERROR: ${{ github.event.inputs.error_summary }}
            COMPANY: ${{ github.event.inputs.company_slug }}
            SOURCE: ${{ github.event.inputs.source }}
            PAYLOAD: ${{ github.event.inputs.payload }}

            ## ERROR CONTEXT (from Hive DB)
            ${{ steps.context.outputs.error_ctx }}

            ## YOUR PROCESS
            1. Read the error details above. Understand what failed and why.
            2. Check CROSS-COMPANY PATTERNS — if a similar error was fixed in another company, apply the same approach.
            3. Search the codebase for the root cause:
               - Check recent git log: `git log --oneline -10`
               - Search for the error: `grep -r 'error text' src/`
               - Read the relevant file(s)
            4. Fix the minimal set of files needed. Do NOT refactor.
            5. Build to verify: `npx next build`
            6. Commit and push:
               ```bash
               git add -A && git commit -m "fix: <what was broken>"
               git push origin main
               ```

            RULES:
            - Fix, don't refactor. Minimum change to resolve the error.
            - Max 3 files per fix. If more needed, log an escalation and add to BACKLOG.md.
            - Always run `npx next build` before committing.
            - Push directly to main (fixes don't need PR review).
            - If you find deeper issues you can't fix now, add them to BACKLOG.md with priority and evidence.

      - name: Log result to Hive
        if: always()
        run: |
          OIDC_TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://hive-phi.vercel.app" \
            | jq -r '.value')
          STATUS="${{ steps.agent.outcome == 'success' && 'success' || 'failed' }}"
          curl -s -X POST "https://hive-phi.vercel.app/api/agents/log" \
            -H "Authorization: Bearer $OIDC_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"company_slug\":\"${{ github.event.inputs.company_slug }}\",\"agent\":\"healer\",\"action_type\":\"error_fix\",\"status\":\"$STATUS\",\"description\":\"Fix workflow on company repo ($STATUS)\"}" || true

      - name: Notify Hive on completion
        if: always() && steps.agent.outcome == 'success'
        env:
          GH_TOKEN: ${{ steps.auth.outputs.gh_pat }}
        run: |
          curl -s -X POST "https://api.github.com/repos/carloshmiranda/hive/dispatches" \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            -d '{"event_type":"healer_complete","client_payload":{"company":"${{ github.event.inputs.company_slug }}","source":"company_fix"}}'
